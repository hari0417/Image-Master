<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        padding-top: 100px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)),
          url(bg1.jpg);
        background-size: cover;
        background-position: center;
        color: white;
      }

      /* ===== PREMIUM NAVBAR ===== */
      .navbar {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 40px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 50px;
        border: 1px solid rgba(255, 215, 0, 0.2);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        z-index: 1000;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo img {
        width: 40px;
      }

      .logo span {
        color: #ffd700;
      }

      .nav-center {
        display: flex;
        gap: 30px;
      }

      .nav-center a {
        text-decoration: none;
        color: #ddd;
        position: relative;
        transition: 0.3s;
      }

      .nav-center a:hover,
      .nav-center a.active {
        color: #ffd700;
      }

      .nav-center a::after {
        content: "";
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 0%;
        height: 2px;
        background: linear-gradient(90deg, #ffd700, transparent);
        transition: 0.4s;
      }

      .nav-center a:hover::after {
        width: 100%;
      }

      /* ===== MAIN ===== */
      .main {
        padding: 20px;
      }

      /* HERO */
      .contact-hero h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #ffd700, #c9a227);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* GRID */
      .contact-row {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
      }

      /* BOX */
      .box {
        width: 350px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 215, 0, 0.2);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        transition: 0.3s;
      }

      .box:hover {
        transform: translateY(-5px) scale(1.02);
      }

      /* CONTACT */
      .contact-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
      }

      .contact-item i {
        color: #ffd700;
      }

      /* SOCIAL */
      .social a {
        font-size: 20px;
        margin-right: 10px;
        color: white;
        transition: 0.3s;
      }

      .social a:hover {
        color: #ffd700;
      }

      /* INPUT */
      .box input,
      .box textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: white;
        outline: none;
      }

      /* BUTTON */
      .box button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #ffd700, #c9a227);
        color: black;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .box button:hover {
        transform: scale(1.05);
      }

      /* RATING */
      .rating i {
        font-size: 25px;
        color: #555;
        cursor: pointer;
      }

      .rating i.active {
        color: #ffd700;
      }

      /* MAP */
      .map iframe {
        width: 100%;
        height: 300px;
        border: none;
        border-radius: 15px;
        margin-top: 20px;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        margin-top: 40px;
        opacity: 0.7;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .navbar {
          padding: 10px 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">
        <img src="image/logo2.png" />
        <h2>Image <span>Masterz</span></h2>
      </div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="packages.html">Packages</a>
        <a href="booking.html">Booking</a>
        <a href="#" class="active">Contact</a>
      </div>
    </header>

    <div class="main">
      <div class="contact-hero" style="text-align: center; margin-bottom: 30px">
        <h1>Let’s Work Together 📸</h1>
      </div>

      <div class="contact-row">
        <!-- BOX 1 -->
        <div class="box">
          <h2>Contact Info</h2>

          <div class="contact-item">
            <i class="fa-solid fa-phone"></i> +91 9876543210
          </div>

          <div class="contact-item">
            <i class="fa-solid fa-envelope"></i> mystudio@gmail.com
          </div>

          <div class="contact-item">
            <i class="fa-solid fa-location-dot"></i> Chennai, India
          </div>

          <div class="social">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-youtube"></i></a>
          </div>
        </div>

        <!-- BOX 2 -->
        <div class="box">
          <h2>Send Message</h2>

          <form
            action="https://formsubmit.co/haribca40@gmail.com"
            method="POST"
          >
            <input type="hidden" name="_captcha" value="false" />
            <input
              type="hidden"
              name="_autoresponse"
              value="Thanks for contacting Image Masterz! We will get back to you shortly."
            />

            <input name="name" type="text" placeholder="Your Name" required />
            <input
              name="email"
              type="email"
              placeholder="Your Email"
              required
            />
            <textarea
              name="message"
              placeholder="Your Message"
              required
            ></textarea>

            <button type="submit">Send Message</button>
          </form>
        </div>

        <!-- BOX 3 -->
        <div class="box">
          <h2>Write Review ⭐</h2>

          <input type="text" id="rname" placeholder="Your Name" />

          <div class="rating" id="rating">
            <i onclick="rate(1)" class="fa-solid fa-star"></i>
            <i onclick="rate(2)" class="fa-solid fa-star"></i>
            <i onclick="rate(3)" class="fa-solid fa-star"></i>
            <i onclick="rate(4)" class="fa-solid fa-star"></i>
            <i onclick="rate(5)" class="fa-solid fa-star"></i>
          </div>

          <textarea id="rtext" placeholder="Your Review"></textarea>

          <button onclick="saveReview()">Submit Review</button>
        </div>
      </div>

      <div class="map">
        <iframe
          src="https://maps.google.com/maps?q=chennai&t=&z=13&ie=UTF8&iwloc=&output=embed"
        ></iframe>
      </div>

      <footer class="footer">© 2026 Image Masterz | All Rights Reserved</footer>
    </div>

    <script>
      let ratingValue = 0;

      function rate(v) {
        ratingValue = v;
        let stars = document.querySelectorAll("#rating i");
        stars.forEach((s, i) => s.classList.toggle("active", i < v));
      }

      function saveReview() {
        let name = document.getElementById("rname").value;
        let text = document.getElementById("rtext").value;

        if (ratingValue === 0) {
          alert("Select star rating!");
          return;
        }

        let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
        reviews.push({ name: name, text: text, stars: ratingValue });
        localStorage.setItem("reviews", JSON.stringify(reviews));

        alert("Review Submitted!");
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
