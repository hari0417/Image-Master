<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pre Wedding Photography</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #000;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px;
}

.header h1 {
  font-size: 40px;
  color: #3B82F6; /* Blue theme */
}

.header p {
  color: #aaa;
}

/* GALLERY */
.gallery {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 15px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">
  <h1>Pre Wedding Photography</h1>
  <p>Beautiful moments captured forever</p>
</div>

<div class="gallery">
