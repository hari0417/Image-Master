<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  padding-top:100px;
  background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)), url(bg1.jpg);
  background-size:cover;
  color:white;
}
.navbar{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  width:90%;display:flex;justify-content:space-between;align-items:center;
  padding:12px 40px;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);
  border-radius:50px;border:1px solid rgba(255,215,0,0.2);
}
.logo span{color:#ffd700;}
.nav-center{display:flex; gap:30px;}
.nav-center a{color:#ddd;text-decoration:none;}
.nav-center a.active,.nav-center a:hover{color:#ffd700;}
.logo {
  display:flex; align-items:center; gap:12px;
}
.logo img {
  width:auto;
  max-height:25px;
  border-radius: 25%;
}
.main{display:flex;min-height:100vh;flex-wrap:wrap;}
.left{
  flex:1;background:url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486") center/cover;
}
.right{
  flex:1;display:flex;justify-content:center;align-items:center;padding:20px;
}
.form-container{
  width:100%;max-width:480px;padding:30px;border-radius:20px;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);
  border:1px solid rgba(255,215,0,0.2);
}
.input-group{margin-bottom:15px;}
.input-group label{font-size:14px;color:#ccc;}
.input-group input,.input-group textarea,.input-group select{
  width:100%;margin-top:5px;padding:10px;border-radius:10px;border:none;outline:none;
}
button{
  width:100%;padding:12px;border-radius:25px;border:none;
  background:linear-gradient(45deg,#ffd700,#c9a227);color:black;font-weight:600;cursor:pointer;
}
</style>
</head>

<body>

 <header class="navbar">
      <div class="logo">
        <img src="logo.jpeg" />
        <h2>Image <span>Masterz</span></h2>
      </div>
      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>  
        <a href="packages.html">Packages</a>
        <a href="#" class="active">Booking</a>
        <a href="contact.html">Contact</a>
      </div>
    </header>
<div class="main">
  <div class="left"></div>

  <div class="right">
    <div class="form-container">
      <h2>📩 Book Your Package</h2>

      <!-- EMAIL FORM -->
      <form action="https://formsubmit.co/haribca40@gmail.com" method="POST">

        <input type="hidden" name="_subject" value="New Booking Request">
        <input type="hidden" name="_captcha" value="false">

        <div class="input-group">
          <label>Name</label>
          <input type="text" name="Name" required />
        </div>

        <div class="input-group">
          <label>Date</label>
          <input type="date" name="Date" required />
        </div>

        <div class="input-group">
          <label>Package</label>
          <select name="Package" required>
            <option>Basic</option>
            <option>Standard</option>
            <option>Premium</option>
            <option>Elite</option>
          </select>
        </div>

        <div class="input-group">
          <label>Event Type</label>
          <select name="Event" required>
            <option>Wedding</option>
            <option>Birthday</option>
            <option>Corporate</option>
          </select>
        </div>

        <div class="input-group">
          <label>Message</label>
          <textarea name="Message"></textarea>
        </div>

        <button type="submit">🚀 Submit Booking</button>

      </form>
    </div>
  </div>
</div>

</body>
</html>
