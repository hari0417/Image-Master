<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Premium Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        padding-top: 100px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)),
          url("https://images.unsplash.com/photo-1529636798458-92182e662485");
        background-size: cover;
        background-position: center;
        color: white;
      }

      /* ===== PREMIUM NAVBAR (HOME STYLE) ===== */
      .navbar {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 40px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 50px;
        border: 1px solid rgba(255, 215, 0, 0.2);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        z-index: 1000;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo img {
        width: 40px;
      }

      .logo span {
        color: #ffd700;
      }

      .nav-center {
        display: flex;
        gap: 30px;
      }

      .nav-center a {
        text-decoration: none;
        color: #ddd;
        position: relative;
        transition: 0.3s;
      }

      .nav-center a:hover,
      .nav-center a.active {
        color: #ffd700;
      }

      .nav-center a::after {
        content: "";
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 0%;
        height: 2px;
        background: linear-gradient(90deg, #ffd700, transparent);
        transition: 0.4s;
      }

      .nav-center a:hover::after {
        width: 100%;
      }

      /* ===== MAIN LAYOUT ===== */
      .main {
        display: flex;
        min-height: 100vh;
      }

      /* ===== LEFT IMAGE ===== */
      .left {
        flex: 1;
        background: url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486")
          center/cover;
        position: relative;
      }

      .left::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.8), transparent);
      }

      /* ===== RIGHT FORM ===== */
      .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* ===== FORM BOX ===== */
      .form-container {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 215, 0, 0.2);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        transition: 0.4s;
      }

      .form-container:hover {
        transform: scale(1.02);
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #ffd700, #c9a227);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ===== INPUTS ===== */
      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        font-size: 14px;
        color: #ccc;
      }

      .input-group input,
      .input-group textarea,
      .input-group select {
        width: 100%;
        margin-top: 5px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-family: "Poppins";
      }

      /* ===== BUTTON ===== */
      button {
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(45deg, #ffd700, #c9a227);
        color: black;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      /* ===== MOBILE ===== */
      @media (max-width: 900px) {
        .main {
          flex-direction: column;
        }

        .left {
          height: 250px;
        }

        .navbar {
          padding: 10px 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- ===== NAVBAR ===== -->
    <header class="navbar">
      <div class="logo">
        <img src="image/logo2.png" />
        <h2>Image <span>Masterz</span></h2>
      </div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="packages.html">Packages</a>
        <a href="#" class="active">Booking</a>
        <a href="contact.html">Contact</a>
      </div>
    </header>

    <div class="main">
      <!-- LEFT -->
      <div class="left"></div>

      <!-- RIGHT -->
      <div class="right">
        <div class="form-container">
          <h2>📸 Premium Booking</h2>

          <form
            onsubmit="
              sendWhatsApp();
              return false;
            "
          >
            <div class="input-group">
              <label>Name</label>
              <input type="text" id="name" required />
            </div>

            <div class="input-group">
              <label>Date</label>
              <input type="date" id="date" required />
            </div>

            <div class="input-group">
              <label>Package</label>
              <select id="package">
                <option>Basic</option>
                <option>Standard</option>
                <option>Premium</option>
                <option>Elite</option>
                <option>Others</option>
              </select>
            </div>

            <div class="input-group">
              <label>Event Type</label>
              <input type="text" id="event" placeholder="Wedding / Birthday" />
            </div>

            <div class="input-group">
              <label>Message</label>
              <textarea id="message"></textarea>
            </div>

            <button type="submit">🚀 Book via WhatsApp</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      function sendWhatsApp() {
        let name = document.getElementById("name").value;
        let date = document.getElementById("date").value;
        let pack = document.getElementById("package").value;
        let event = document.getElementById("event").value;
        let message = document.getElementById("message").value;

        let text = `Booking Request:
Name: ${name}
Date: ${date}
Package: ${pack}
Event: ${event}
Message: ${message}`;

        let url = "https://wa.me/919876543210?text=" + encodeURIComponent(text);

        window.open(url, "_blank");
      }
    </script>
  </body>
</html>
